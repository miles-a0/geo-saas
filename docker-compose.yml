version: '3.8'

services:
  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: geosaas_frontend
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:3001/api}
    depends_on:
      - api
    networks:
      - geo-saas
    restart: unless-stopped

  # Node.js API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: geosaas_api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRODUCT_INDIVIDUAL=${STRIPE_PRODUCT_INDIVIDUAL}
      - STRIPE_PRODUCT_SUBSCRIPTION=${STRIPE_PRODUCT_SUBSCRIPTION}
      - STRIPE_PRICE_INDIVIDUAL=${STRIPE_PRICE_INDIVIDUAL}
      - STRIPE_PRICE_SUBSCRIPTION=${STRIPE_PRICE_SUBSCRIPTION}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Geo-SaaS}
      - DOMAIN=${DOMAIN}
      - FRONTEND_URL=${FRONTEND_URL}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - geo-saas
    restart: unless-stopped
    volumes:
      - report_storage:/app/reports

  # Python Report Worker
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: geosaas_worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_BASE_URL=http://api:3001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-3}
      - WORKER_TIMEOUT_MS=${WORKER_TIMEOUT_MS:-300000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_started
    networks:
      - geo-saas
    restart: unless-stopped
    volumes:
      - report_storage:/app/reports
      - ./worker/scripts:/app/scripts:ro

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: geosaas_postgres
    environment:
      - POSTGRES_USER=${DB_USER:-geosaas}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-geosaas_secure_password_2024}
      - POSTGRES_DB=${DB_NAME:-geosaas_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - geo-saas
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-geosaas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: geosaas_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - geo-saas
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  report_storage:

networks:
  geo-saas:
    driver: bridge
